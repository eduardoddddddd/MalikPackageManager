name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Python syntax
        run: |
          python -m py_compile bin/mpm bin/mpm-pkg src/mpm/*.py

      - name: Shell syntax
        run: make lint-shell

      - name: JSON syntax
        run: make validate-json

      - name: Unit tests
        run: make test

      - name: Binary self-tests
        run: make validate

      - name: PKGBUILD syntax
        run: bash -n PKGBUILD

      - name: Optional shellcheck
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck install.sh bin/mpm-open bin/mpm-host-open-url scripts/distrobox/mpm-distrobox-bridge.sh
          else
            echo "shellcheck not installed; skipping optional lint."
          fi
